<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Bee-Bot en HTML5</title>
    <style>
        :root {
            --total-size: 500px; /* Tamaño total fijo del tapete */
            --cols: 5;
            --rows: 5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        p {
            text-align: center;
            color: #555;
            max-width: 600px;
        }

        /* Contenedor principal para el tapete y los controles */
        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        /* El Tapete / Cuadrícula */
        .grid {
            position: relative;
            width: var(--total-size);
            height: var(--total-size);
            background-color: #e0e0e0;
            border: 4px solid #333;
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            grid-template-rows: repeat(var(--rows), 1fr);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            background-size: cover;
            background-position: center;
        }

        /* Celdas del tapete */
        .cell {
            border: 2px dashed rgba(0, 0, 0, 0.5); /* Borde visible sobre imágenes */
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* El Robot (Bee-Bot) */
        #robot {
            position: absolute;
            width: calc(100% / var(--cols));
            height: calc(100% / var(--rows));
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            z-index: 10;
        }

        /* Diseño del SVG del Robot */
        #robot svg {
            width: 80%;
            height: 80%;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        /* Panel de Control */
        .controls {
            background: #ffcc00;
            padding: 20px;
            border-radius: 15px;
            border: 4px solid #ff9900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            width: 300px; /* Ancho fijo para los controles */
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 10px;
        }

        button, .upload-btn {
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #ccc;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        button:active, .upload-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        /* Posiciones en el D-Pad */
        #btn-fwd { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-go { 
            grid-column: 2; 
            grid-row: 2; 
            background-color: #4CAF50; 
            color: white; 
            border-color: #2e7d32;
            box-shadow: 0 4px 0 #2e7d32;
        }
        #btn-go:active { box-shadow: 0 0 0 #2e7d32; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-back { grid-column: 2; grid-row: 3; }

        /* Contenedor de botones de acción inferiores */
        .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        /* Botón de Detener */
        #btn-stop {
            flex: 1;
            padding: 10px 5px;
            background-color: #ff9800; /* Naranja */
            color: white;
            border-color: #f57c00;
            box-shadow: 0 4px 0 #f57c00;
            font-size: 1.1rem;
        }
        #btn-stop:active { box-shadow: 0 0 0 #f57c00; }

        /* Botón de Borrar */
        #btn-clear {
            flex: 1;
            padding: 10px 5px;
            background-color: #f44336;
            color: white;
            border-color: #c62828;
            box-shadow: 0 4px 0 #c62828;
            font-size: 1.1rem;
        }
        #btn-clear:active { box-shadow: 0 0 0 #c62828; }

        /* Botón de Reiniciar */
        #btn-reset {
            flex: 1;
            padding: 10px 5px;
            background-color: #2196F3;
            color: white;
            border-color: #1565C0;
            box-shadow: 0 4px 0 #1565C0;
            font-size: 1.1rem;
        }
        #btn-reset:active { box-shadow: 0 0 0 #1565C0; }

        /* Botón de Volar (Aleatorio) */
        #btn-random {
            width: 100%;
            padding: 10px;
            background-color: #00bcd4;
            color: white;
            border-color: #00838f;
            box-shadow: 0 4px 0 #00838f;
            font-size: 1.2rem;
            margin-top: -10px; /* Acercar al panel de arriba */
        }
        #btn-random:active { box-shadow: 0 0 0 #00838f; }

        /* Visualizador de la secuencia programada */
        .sequence-display {
            background: white;
            width: 100%;
            min-height: 50px;
            border: 3px inset #ccc;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap; /* Permite que los comandos salten a la siguiente línea */
            align-content: flex-start;
            padding: 8px;
            box-sizing: border-box;
            gap: 5px;
            font-size: 1.5rem;
        }

        /* Estilo para los símbolos en la pantalla */
        .sequence-display span {
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* Controles de configuración (Cargar/Eliminar Tapete) */
        .settings {
            width: 100%;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .upload-btn {
            background-color: #9c27b0;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            border-color: #7b1fa2;
            box-shadow: 0 4px 0 #7b1fa2;
        }

        .remove-btn {
            background-color: #ff9800;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            border-color: #f57c00;
            box-shadow: 0 4px 0 #f57c00;
        }

        .download-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            border-color: #2e7d32;
            box-shadow: 0 4px 0 #2e7d32;
        }

        /* Estilos para el selector de tapetes */
        .mat-select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid #333;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            background-color: #fff;
        }

        /* Línea separadora */
        .divider {
            width: 100%;
            max-width: 600px;
            height: 2px;
            background-color: #ccc;
            border: none;
            margin: 5px auto 15px auto;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            :root {
                --total-size: 300px; /* Tapete más pequeño en móviles */
            }
            .cell {
                font-size: 1.5rem; /* Ajustar fuente en móviles */
            }
            .controls {
                width: 100%;
                max-width: 320px;
            }
        }

    </style>
</head>
<body>

    <h1>Simulador Bee-Bot 🐝</h1>
    <h3>© Creado por Javier Guerrero</h3>
    <h4>jgueperl@gobiernodecanarias.org</h4>
    <p>Programa los movimientos y pulsa <strong>GO</strong> para ejecutar la secuencia.<br>Usa <strong>Borrar</strong> para limpiar los comandos y <strong>Reiniciar</strong> para volver al inicio.</p>

    <!-- Controles del tapete personalizado -->
    <div class="settings">
        <select id="mat-selector" class="mat-select" onchange="changeMat()">
            <option value="none">-- Elige un tapete --</option>
            <option value="city">Lugares de una ciudad</option>
            <option value="park">El parque</option>
            <option value="alphabet">Abecedario</option>
            <option value="numbers">Números aleatorios (1-25)</option>
            <option value="canarias">Islas Canarias</option>
        </select>
        <label for="bg-upload" class="upload-btn">Cargar Tapete (Imagen 1:1) 🖼️</label>
        <input type="file" id="bg-upload" accept="image/*" style="display: none;">
        <button id="btn-remove-bg" class="remove-btn" onclick="removeBackground()">Eliminar tapete 🗑️</button>
    </div>

    <!-- Nuevos controles de tamaño de cuadrícula -->
    <div class="settings" style="margin-top: -10px;">
        <label for="grid-size" style="font-weight: bold; font-size: 1.1rem; color: #333; display: flex; align-items: center;">Tamaño de cuadrícula:</label>
        <select id="grid-size" class="mat-select" onchange="changeGridSize()">
            <option value="4">4 x 4</option>
            <option value="5" selected>5 x 5 (Por defecto)</option>
            <option value="6">6 x 6</option>
            <option value="7">7 x 7</option>
            <option value="8">8 x 8</option>
            <option value="9">9 x 9</option>
            <option value="10">10 x 10</option>
        </select>
    </div>

    <!-- Línea visual separadora -->
    <hr class="divider">

    <!-- Controles para descargar plantilla vacía -->
    <div class="settings" style="margin-top: -10px;">
        <label for="download-grid-size" style="font-weight: bold; font-size: 1.1rem; color: #333; display: flex; align-items: center;">Plantilla (vacía):</label>
        <select id="download-grid-size" class="mat-select">
            <option value="4">4 x 4</option>
            <option value="5" selected>5 x 5</option>
            <option value="6">6 x 6</option>
            <option value="7">7 x 7</option>
            <option value="8">8 x 8</option>
            <option value="9">9 x 9</option>
            <option value="10">10 x 10</option>
        </select>
        <button class="download-btn" onclick="downloadEmptyMat()">DESCARGAR TAPETE VACÍO ⬇️</button>
    </div>

    <div class="container">
        <!-- Área del Tapete -->
        <div class="grid" id="grid">
            <!-- El Robot (Vista desde arriba con SVG) -->
            <div id="robot">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Cuerpo base amarillo -->
                    <rect x="15" y="10" width="70" height="80" rx="35" fill="#ffcc00" stroke="#333" stroke-width="4"/>
                    
                    <!-- Franjas negras de la abeja -->
                    <rect x="15" y="52" width="70" height="10" fill="#333"/>
                    <rect x="15" y="72" width="70" height="10" fill="#333"/>
                    
                    <!-- Ojos (indican el frente) -->
                    <circle cx="32" cy="26" r="8" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="32" cy="24" r="3" fill="#333"/>
                    
                    <circle cx="68" cy="26" r="8" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="68" cy="24" r="3" fill="#333"/>

                    <!-- Botón central decorativo -->
                    <circle cx="50" cy="40" r="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
                </svg>
            </div>
            <!-- Las celdas se generarán por JavaScript -->
        </div>

        <!-- Área de Controles -->
        <div class="controls">
            <!-- Pantalla de comandos -->
            <div class="sequence-display" id="sequence"></div>
            
            <!-- Botones de dirección (Cruceta) -->
            <div class="d-pad">
                <button id="btn-fwd" onclick="addCommand('fwd', '⬆️')" title="Avanzar">↑</button>
                <button id="btn-left" onclick="addCommand('left', '↰')" title="Girar Izquierda">↰</button>
                <button id="btn-go" onclick="executeSequence()" title="Ejecutar">GO</button>
                <button id="btn-right" onclick="addCommand('right', '↱')" title="Girar Derecha">↱</button>
                <button id="btn-back" onclick="addCommand('back', '⬇️')" title="Retroceder">↓</button>
            </div>

            <!-- Botones de acción general -->
            <div class="action-buttons">
                <button id="btn-stop" onclick="stopSequence()">Detener 🛑</button>
                <button id="btn-clear" onclick="clearSequence()">Borrar (X)</button>
                <button id="btn-reset" onclick="resetSimulator()">Reiniciar 🔄</button>
            </div>

            <!-- Botón Aleatorio -->
            <button id="btn-random" onclick="randomizeRobot()">Que vuele la abeja 🎲</button>
        </div>
    </div>

    <script>
        // Configuración de la cuadrícula
        let cols = 5;
        let rows = 5;
        
        // Función para obtener el tamaño actual de la celda (útil para diseño responsivo)
        function getGridSize() {
            const gridElement = document.getElementById('grid');
            return gridElement.clientWidth / cols;
        }

        // Estado inicial del Robot
        const START_X = 0; // Columna inicial (izquierda)
        let START_Y = 4; // Fila inicial (abajo)
        const START_ANGLE = 0; // Mirando hacia arriba

        // Estado actual del Robot
        let robotX = START_X; 
        let robotY = START_Y; 
        let robotAngle = START_ANGLE; 
        
        // Memoria de comandos
        let commands = [];
        let isExecuting = false;
        let stopRequested = false; // Nueva variable para saber si se ha pedido detener el robot

        // Referencias al DOM
        const robotElement = document.getElementById('robot');
        const sequenceDisplay = document.getElementById('sequence');
        const gridElement = document.getElementById('grid');
        const matSelector = document.getElementById('mat-selector');

        // Arreglo para guardar las celdas y poder modificarlas
        const gridCells = [];

        // Función para asegurar que la casilla de inicio siempre muestre "COMIENZO"
        function setStartCell() {
            const startIndex = (rows - 1) * cols; // Esquina inferior izquierda
            if (gridCells[startIndex]) {
                gridCells[startIndex].textContent = 'COMIENZO';
                // Ajustar el tamaño del texto para que encaje bien según el tamaño de la cuadrícula
                gridCells[startIndex].style.fontSize = `calc(5.5rem / ${cols})`;
            }
        }

        // Generar celdas visuales del tapete
        for (let i = 0; i < cols * rows; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            gridElement.appendChild(cell);
            gridCells.push(cell); // Guardamos la celda en el arreglo
        }

        // Aplicamos el texto de comienzo por primera vez al arrancar
        setStartCell();

        // Datos para los tapetes por defecto (usamos arrays base que se repetirán si el tapete es más grande)
        const predefinedMats = {
            city: ['🏥','🏫','🚓','🚒','🏪','🏦','🏭','🏟️','🏛️','⛪','🚌','⛽','🍔','☕','🎬','🌳','🚥','🏗️','🏢','🏠','🏨','🏤','🚆','✈️','🎡'],
            park: ['🌳','🌲','⛲','🦆','🦢','🌷','🌻','🦋','🐌','🐜','🐞','🚲','🪁','⚽','🌭','🍦','🗑️','🪑','🪴','🐿️','🦔','🍄','🍂','☀️','☁️'],
            alphabet: ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','Ñ','O','P','Q','R','S','T','U','V','W','X','Y','Z'] // 27 letras, incluyendo Y y Z
        };

        // Función para cambiar el tamaño de la cuadrícula
        function changeGridSize() {
            if (isExecuting) return;

            const newSize = parseInt(document.getElementById('grid-size').value);
            cols = newSize;
            rows = newSize;
            START_Y = rows - 1; // Actualizar posición de salida inferior izquierda

            // Actualizar variables CSS
            document.documentElement.style.setProperty('--cols', cols);
            document.documentElement.style.setProperty('--rows', rows);

            // Reconstruir el grid eliminando las celdas antiguas
            const gridElement = document.getElementById('grid');
            const robotElement = document.getElementById('robot');
            gridElement.innerHTML = ''; 
            gridElement.appendChild(robotElement); // Devolver el robot al tapete
            gridCells.length = 0; // Limpiar memoria de celdas

            // Crear las nuevas celdas
            for (let i = 0; i < cols * rows; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                gridElement.appendChild(cell);
                gridCells.push(cell);
            }

            // Repintar tapete y resetear robot a su posición correcta
            changeMat();
            resetSimulator();
        }

        // Función para cambiar el tapete desde el menú desplegable
        function changeMat() {
            const selection = matSelector.value;
            
            // Primero, eliminamos cualquier imagen de fondo del modo "Cargar tapete"
            gridElement.style.backgroundImage = 'none';
            const bgUpload = document.getElementById('bg-upload');
            if(bgUpload) bgUpload.value = '';

            // Limpiamos el contenido de todas las celdas y restauramos el tamaño de fuente
            // Ajustamos el tamaño base de los textos de forma dinámica según la cuadrícula
            let baseFontSize = `calc(12.5rem / ${cols})`;
            
            gridCells.forEach(cell => {
                cell.textContent = '';
                cell.style.fontSize = baseFontSize;
            });

            if (selection === 'none') {
                setStartCell();
                return;

xB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGxB0AAAbEHQAABsQdAAAGAoz+RGRXZQuRAAAAAElFTkSuQmCC'; 
                
                gridElement.style.backgroundImage = `url('data:image/png;base64,${base64Canarias}')`;
                setStartCell();
                return;
            }

            let itemsToDisplay = [];
            const totalCells = cols * rows;

            if (selection === 'numbers') {
                // Generar números dinámicamente según la cantidad de celdas actuales (ej: 1 al 100 en modo 10x10)
                itemsToDisplay = Array.from({length: totalCells}, (_, i) => i + 1);
                itemsToDisplay.sort(() => Math.random() - 0.5);
            } else if (selection === 'alphabet') {
                // Mezclar las 27 letras del abecedario
                let letrasMezcladas = [...predefinedMats['alphabet']].sort(() => Math.random() - 0.5);
                
                // Preparar un array vacío del tamaño de la cuadrícula
                itemsToDisplay = new Array(totalCells).fill('');
                
                // Cuántas letras podemos poner (máximo 27, o el total de celdas si es más pequeño como 4x4)
                let cantidadAPoner = Math.min(totalCells, letrasMezcladas.length);
                
                // Elegir posiciones aleatorias únicas en la cuadrícula para repartir las letras
                let posicionesDisponibles = Array.from({length: totalCells}, (_, i) => i).sort(() => Math.random() - 0.5);
                
                for (let i = 0; i < cantidadAPoner; i++) {
                    itemsToDisplay[posicionesDisponibles[i]] = letrasMezcladas[i];
                }
            } else if (predefinedMats[selection]) {
                const baseArray = predefinedMats[selection];
                
                // Rellenar las casillas repitiendo los elementos si es necesario para que no queden huecos en blanco
                let baseIndex = 0;
                for (let i = 0; i < totalCells; i++) {
                    itemsToDisplay.push(baseArray[baseIndex % baseArray.length]);
                    baseIndex++;
                }
            }

            // Colocar los elementos o letras en las celdas
            gridCells.forEach((cell, index) => {
                if (itemsToDisplay[index] !== undefined) {
                    cell.textContent = itemsToDisplay[index];
                }
            });

            // Asegurar siempre la palabra COMIENZO en el inicio al cambiar de tapete
            setStartCell();
        }

        // Actualizar la posición visual del robot en la pantalla
        function updateRobotPosition() {
            const gridSize = getGridSize();
            const xPos = robotX * gridSize;
            const yPos = robotY * gridSize;
            // Aplicamos la transformación CSS
            robotElement.style.transform = `translate(${xPos}px, ${yPos}px) rotate(${robotAngle}deg)`;
        }

        // Inicializar la posición al cargar la página
        updateRobotPosition();

        // Actualizar posición si se redimensiona la ventana (responsividad)
        window.addEventListener('resize', updateRobotPosition);

        // Añadir comando a la cola
        function addCommand(action, symbol) {
            if (isExecuting) return; // Bloquear controles durante la ejecución
            commands.push(action);
            const span = document.createElement('span');
            span.textContent = symbol;
            sequenceDisplay.appendChild(span);
        }

        // Función para detener la secuencia en curso
        function stopSequence() {
            if (isExecuting) {
                stopRequested = true;
            }
        }

        // Limpiar ÚNICAMENTE la memoria de comandos
        function clearSequence() {
            if (isExecuting) return; // No permitir borrar mientras se mueve
            commands = [];
            sequenceDisplay.innerHTML = '';
        }

        // REINICIAR: Limpia comandos y devuelve al robot a su posición inicial
        function resetSimulator() {
            if (isExecuting) return; // No permitir reiniciar mientras se mueve
            
            // Restablecer valores de estado
            robotX = START_X;
            robotY = START_Y;
            robotAngle = START_ANGLE;
            
            // Actualizar vista
            updateRobotPosition();
            clearSequence();
        }

        // Función para colocar a la abeja en una posición y dirección aleatoria
        function randomizeRobot() {
            if (isExecuting) return; // Bloquear si se está moviendo

            // Limpiamos los comandos anteriores para empezar un nuevo reto
            clearSequence();

            // Generar coordenadas X e Y aleatorias (entre 0 y el número máximo de columnas/filas - 1)
            robotX = Math.floor(Math.random() * cols);
            robotY = Math.floor(Math.random() * rows);

            // Generar un ángulo aleatorio (0, 90, 180 o 270 grados)
            const randomDirection = Math.floor(Math.random() * 4); // 0, 1, 2 o 3
            robotAngle = randomDirection * 90;

            // Actualizar la vista con una pequeña animación de "salto"
            robotElement.style.transition = "all 0.3s cubic-bezier(0.25, 1.5, 0.5, 1)";
            robotElement.style.transform = `translate(${robotX * getGridSize()}px, ${robotY * getGridSize()}px) rotate(${robotAngle}deg) scale(1.2)`;
            
            // Volver al tamaño normal tras el "salto"
            setTimeout(() => {
                robotElement.style.transition = "all 0.5s ease";
                updateRobotPosition();
            }, 300);
        }

        // Función auxiliar para esperar (promesa)
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Ejecutar la secuencia de comandos paso a paso
        async function executeSequence() {
            if (isExecuting || commands.length === 0) return;
            isExecuting = true;
            stopRequested = false; // Reiniciamos la bandera al comenzar

            // Recorremos la memoria de comandos
            for (let i = 0; i < commands.length; i++) {
                // Comprobar si se pulsó el botón de detener
                if (stopRequested) {
                    break; // Salimos del bucle instantáneamente
                }

                // Resaltar el comando actual en el display
                const spans = sequenceDisplay.querySelectorAll('span');
                spans.forEach(s => {
                    s.style.backgroundColor = 'transparent';
                    s.style.boxShadow = 'none';
                });
                
                spans[i].style.backgroundColor = '#fff59d'; // Amarillo claro
                spans[i].style.boxShadow = '0 0 5px #fbc02d';
                
                // Hacer scroll automático si la lista de comandos es muy larga
                spans[i].scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });

                let action = commands[i];

                // Ejecutar la acción
                switch (action) {
                    case 'fwd':
                        move(1);
                        break;
                    case 'back':
                        move(-1);
                        break;
                    case 'left':
                        robotAngle -= 90;
                        break;
                    case 'right':
                        robotAngle += 90;
                        break;
                }

                updateRobotPosition();
                
                // Pausa entre cada movimiento para la animación (ms)
                await sleep(600); 
            }

            // Quitar el resaltado al terminar (o al detenerse)
            const spans = sequenceDisplay.querySelectorAll('span');
            spans.forEach(s => {
                s.style.backgroundColor = 'transparent';
                s.style.boxShadow = 'none';
            });
            
            isExecuting = false;
            stopRequested = false; // Reseteamos la bandera por seguridad
        }

        // Lógica de avance en el eje correspondiente según hacia dónde mire el robot
        function move(steps) {
            // Calculamos el ángulo lógico para saber la dirección exacta en el tapete, 
            // independientemente de las vueltas acumuladas en la animación visual
            let logicalAngle = (robotAngle % 360 + 360) % 360;
            
            let newX = robotX;
            let newY = robotY;

            if (logicalAngle === 0) newY -= steps; // Arriba
            if (logicalAngle === 90) newX += steps; // Derecha
            if (logicalAngle === 180) newY += steps; // Abajo
            if (logicalAngle === 270) newX -= steps; // Izquierda

            // Comprobar colisiones con los bordes del tapete
            if (newX >= 0 && newX < cols && newY >= 0 && newY < rows) {
                robotX = newX;
                robotY = newY;
            } else {
                // El robot parpadea rojo si intenta salir del tablero (choca)
                const originalStroke = robotElement.querySelector('rect').getAttribute('stroke');
                
                // Cambiamos el color del borde del cuerpo de la abeja a rojo
                robotElement.querySelectorAll('rect, circle').forEach(el => {
                    if (el.getAttribute('stroke') === '#333') {
                        el.setAttribute('stroke', 'red');
                    }
                });

                // Añadimos una vibración rápida
                const currentTransform = robotElement.style.transform;
                robotElement.style.transform = currentTransform + ' scale(0.9)';
                
                setTimeout(() => {
                    // Restauramos el color original
                    robotElement.querySelectorAll('rect, circle').forEach(el => {
                        if (el.getAttribute('stroke') === 'red') {
                            el.setAttribute('stroke', '#333');
                        }
                    });
                    robotElement.style.transform = currentTransform;
                }, 300);
            }
        }

        // Lógica para cargar la imagen de fondo (Tapete)
        const bgUpload = document.getElementById('bg-upload');
        bgUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Establecemos la imagen cargada como fondo del tapete
                    gridElement.style.backgroundImage = `url(${e.target.result})`;
                    // Limpiamos el menú desplegable y el texto de las celdas
                    matSelector.value = 'none';
                    gridCells.forEach(cell => cell.textContent = '');
                    setStartCell(); // Añadir texto de comienzo incluso con tapetes de usuario
                };
                reader.readAsDataURL(file); // Leer archivo como URL de datos
            }
        });

        // Lógica para eliminar la imagen de fondo (Tapete)
        function removeBackground() {
            gridElement.style.backgroundImage = 'none';
            bgUpload.value = ''; // Reseteamos el input
            matSelector.value = 'none'; // Reseteamos el selector
            gridCells.forEach(cell => cell.textContent = ''); // Limpiamos las celdas
            setStartCell(); // Asegurar que el texto de comienzo no se borre
        }

        // Lógica para descargar la plantilla vacía del tapete en PNG
        function downloadEmptyMat() {
            const size = parseInt(document.getElementById('download-grid-size').value);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Tamaño de alta resolución (1000x1000) para asegurar buena calidad al editar en otros programas
            const canvasSize = 1000;
            canvas.width = canvasSize;
            canvas.height = canvasSize;

            // Dibujar fondo gris claro
            ctx.fillStyle = '#e0e0e0';
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            const cellSize = canvasSize / size;

            // Dibujar celdas (líneas discontinuas interiores imitando el CSS)
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.lineWidth = 4;
            ctx.setLineDash([15, 15]);

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    ctx.strokeRect(c * cellSize, r * cellSize, cellSize, cellSize);
                }
            }

            // Dibujar borde exterior sólido
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 16;
            ctx.setLineDash([]); // Quitar línea discontinua
            ctx.strokeRect(0, 0, canvasSize, canvasSize);

            // Crear un enlace temporal para forzar la descarga de la imagen generada
            const link = document.createElement('a');
            link.download = `plantilla_tapete_${size}x${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
